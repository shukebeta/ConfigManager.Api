name: CI (Api)

# Path-scoped: only Api changes (or this workflow file) trigger the Redis-backed
# Api test suite; Web changes route to ci-web.yml.
on:
  push:
    branches: [master]
    paths:
      - 'ConfigManager.Api/**'
      - '.github/workflows/ci-api.yml'
  pull_request:
    paths:
      - 'ConfigManager.Api/**'
      - '.github/workflows/ci-api.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        # Throwaway instance — the suite flushdb's db 15 before each test.
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ConfigManager.Api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ConfigManager.Api/package-lock.json

      - run: npm ci

      - run: npm test
        env:
          TEST_REDIS_URL: redis://127.0.0.1:6379/15
