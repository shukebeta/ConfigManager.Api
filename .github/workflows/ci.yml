name: CI

# Path-scoped so doc-only or unrelated changes don't spin a Redis service
# container; this also keeps the workflow ready to slot into the monorepo
# path-filtered CI planned in #2.
on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        # Throwaway instance — the suite flushdb's db 15 before each test.
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm test
        env:
          TEST_REDIS_URL: redis://127.0.0.1:6379/15
